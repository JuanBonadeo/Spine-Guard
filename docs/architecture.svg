<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arquitectura de Spine Guard: un nucleo compartido con dos interfaces (escritorio y web)">
  <rect x="0" y="0" width="900" height="460" rx="16" fill="#1E1E1E"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

    <text x="450" y="42" text-anchor="middle" fill="#FFFFFF" font-size="21" font-weight="700">Un nucleo, dos interfaces</text>

    <!-- Webcam -->
    <rect x="385" y="64" width="130" height="40" rx="10" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="450" y="89" text-anchor="middle" fill="#FFFFFF" font-size="14">Webcam</text>

    <!-- arrow webcam -> core -->
    <line x1="450" y1="106" x2="450" y2="144" stroke="#4DA3FF" stroke-width="2"/>
    <polygon points="443,144 457,144 450,151" fill="#4DA3FF"/>

    <!-- core (shared) -->
    <rect x="150" y="150" width="600" height="130" rx="14" fill="#1F1F1F" stroke="#007AFF" stroke-width="1.5"/>
    <text x="172" y="180" fill="#4DA3FF" font-size="14" font-weight="700">core/  —  motor de analisis compartido</text>

    <rect x="172" y="200" width="100" height="40" rx="10" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="222" y="224" text-anchor="middle" fill="#E5E5EA" font-size="12">analyzer</text>
    <rect x="286" y="200" width="100" height="40" rx="10" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="336" y="224" text-anchor="middle" fill="#E5E5EA" font-size="12">filtros</text>
    <rect x="400" y="200" width="100" height="40" rx="10" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="450" y="224" text-anchor="middle" fill="#E5E5EA" font-size="12">health</text>
    <rect x="514" y="200" width="100" height="40" rx="10" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="564" y="224" text-anchor="middle" fill="#E5E5EA" font-size="12">stats</text>
    <rect x="628" y="200" width="100" height="40" rx="10" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="678" y="224" text-anchor="middle" fill="#E5E5EA" font-size="12">config</text>

    <text x="172" y="266" fill="#808080" font-size="11">reutilizado por ambas interfaces, sin dependencias de UI</text>

    <!-- arrows core -> frontends -->
    <line x1="290" y1="282" x2="290" y2="324" stroke="#4DA3FF" stroke-width="2"/>
    <polygon points="283,324 297,324 290,331" fill="#4DA3FF"/>
    <line x1="610" y1="282" x2="610" y2="324" stroke="#4DA3FF" stroke-width="2"/>
    <polygon points="603,324 617,324 610,331" fill="#4DA3FF"/>

    <!-- desktop -->
    <rect x="150" y="330" width="280" height="96" rx="14" fill="#2A2A2A" stroke="#3A3A3A"/>
    <text x="172" y="362" fill="#FFFFFF" font-size="16" font-weight="700">Escritorio</text>
    <text x="172" y="384" fill="#A0A0A0" font-size="12">CustomTkinter  ·  main_v3.py</text>
    <text x="172" y="406" fill="#6E6E6E" font-size="11">sidebar · health ring · dashboard · tray</text>

    <!-- web -->
    <rect x="470" y="330" width="280" height="96" rx="14" fill="#2A2A2A" stroke="#30D158"/>
    <text x="492" y="362" fill="#FFFFFF" font-size="16" font-weight="700">Web</text>
    <rect x="536" y="349" width="46" height="18" rx="9" fill="#30D158"/>
    <text x="559" y="362" text-anchor="middle" fill="#0B2A14" font-size="10" font-weight="700">nuevo</text>
    <text x="492" y="384" fill="#A0A0A0" font-size="12">Flask  ·  main_web.py</text>
    <text x="492" y="406" fill="#6E6E6E" font-size="11">MJPEG · /status · tema dark/light</text>

  </g>
</svg>
